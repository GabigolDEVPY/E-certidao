{% extends "base.html" %}
{% block content %}

<div style="
  max-width: 520px;
  margin: 80px auto;
  padding: 48px 32px;
  text-align: center;
  background: var(--paper, #fff);
  border: 1px solid var(--rule, #e5e7eb);
  border-radius: 12px;
">
  <div style="
    width: 64px; height: 64px;
    margin: 0 auto 24px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  ">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12" />
    </svg>
  </div>

  <h1 style="font-size: 24px; font-weight: 700; color: #111; margin-bottom: 12px;">
    Pagamento confirmado!
  </h1>

  <p style="font-size: 15px; color: #6b7280; line-height: 1.6; margin-bottom: 32px;">
    Seu pedido de certidão foi recebido e o pagamento foi processado com sucesso.
    Você receberá atualizações por e-mail sobre o andamento.
  </p>

  <a href="{% url 'home' %}"
     style="
       display: inline-block;
       padding: 12px 32px;
       background: #111;
       color: #fff;
       font-size: 14px;
       font-weight: 600;
       border-radius: 8px;
       text-decoration: none;
       transition: opacity .2s;
     "
     onmouseover="this.style.opacity='0.85'"
     onmouseout="this.style.opacity='1'"
  >
    Voltar ao início
  </a>
</div>

{% endblock %}
